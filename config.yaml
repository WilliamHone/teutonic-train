# config.yaml
# =============================================================================
# Model & Data
# =============================================================================
model_path: conanedoAI/Teutonic-VIII-5Ek5KoE5-v1-5x-1196
data_file: datasets/dataset_v002_std.jsonl
eval_shard_dir: "../teutonic_dataset_eval"      # Directory with .npy files
eval_shard_seq_len: 2048                     # Should match max_length
eval_shard_max_samples: 100                 # Per-shard sampling limit
eval_shard_total_samples: 10000              # Global limit (optional)
eval_shard_seed: 10                          # For reproducibility
output_dir: checkpoints/VIII/teutonic_vera6_v11

# ✅ Use SFTConfig's native fields:
max_length: 2048           # ← from SFTConfig
seed: 10                  # ← from TrainingArguments
eval_split_ratio: 0     # ✅ Custom field
skip_prepare_dataset: true # ✅ Custom field

# =============================================================================
# LoRA
# =============================================================================
use_lora: true
r: 128
alpha: 1280
dropout: 0.1
target_modules: "all-linear"
init_lora_weights: "gaussian"
# use_rslora: true

# =============================================================================
# Training (ALL from SFTConfig - no conflicts!)
# =============================================================================
num_train_epochs: 1
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 2e-6
lr_scheduler_type: "cosine_with_min_lr"
lr_scheduler_kwargs:
  min_lr_rate: 1
warmup_steps: 0
bf16: true
optim: "adamw_torch_fused"
use_liger_kernel: true
dataloader_drop_last: true
dataloader_num_workers: 2
dataloader_pin_memory: true
weight_decay: 0.01

# Logging & checkpointing
logging_steps: 5
eval_strategy: "steps"
save_strategy: "steps"
eval_steps: 50
save_steps: 50
save_only_model: true
include_num_input_tokens_seen: true
report_to: "wandb"

# Resume
auto_resume: true
log_dir: "logs"

# Distributed
ddp_backend: "nccl"
ddp_find_unused_parameters: false
save_on_each_node: false